<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Analyzer // Matrix Edition</title>
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js Engine Source Link -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <header>
            <h1>AI RESUME ANALYZER</h1>
            <p class="subtitle">AUTOMATED ATS COMPLIANCE MATRIX</p>
        </header>

        <main>
            <!-- Central Workspace Parser Zone -->
            <section class="upload-section">
                <form id="uploadForm">
                    <div class="file-upload-box">
                        <label for="resumeInput">UPLOAD RESUME (PDF ONLY)</label>
                        <input type="file" id="resumeInput" name="resume" accept=".pdf" required />
                    </div>
                    
                    <div class="input-box">
                        <label for="jdInput">TARGET JOB DESCRIPTION</label>
                        <textarea id="jdInput" placeholder="Paste target requirements compliance matrix here..." rows="6"></textarea>
                    </div>
                    
                    <button type="submit" class="btn-primary">EXECUTE PIPELINE PARSE //</button>
                </form>
            </section>

            <!-- Container where Gemini AI results will print out -->
            <section id="resultsContainer" class="results-section"></section>

            <!-- Analytics Dashboard Viewport Area -->
            <section id="analyticsTab" class="analytics-section">
                <h2>[SYSTEM_METRICS_DASHBOARD]</h2>
                <div class="stats-grid">
                    <div class="stat-card">
                        <p class="stat-label">Total Uploads</p>
                        <span id="totalResumes" class="stat-value">0</span>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Average ATS Rating</p>
                        <span id="averageScore" class="stat-value">0%</span>
                    </div>
                    <div class="stat-card">
                        <p class="stat-label">Peak Rating</p>
                        <span id="highestScore" class="stat-value">0%</span>
                    </div>
                </div>
                
                <!-- Glowing Canvas Element for ChartJS Graphic Rendering -->
                <div class="chart-container" style="position: relative; width: 100%; max-width: 500px; margin: 30px auto;">
                    <canvas id="metricsChart"></canvas>
                </div>
            </section>
        </main>
    </div>

    <!-- Your Main Script Engine -->
    <script src="script.js"></script>
</body>
</html>
