<!DOCTYPE html>
<html>
<head>
    <title>Resume History</title>

    <style>
        body{
            font-family:Segoe UI;
            background:#0f172a;
            color:white;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            color:black;
            border-radius:15px;
            overflow:hidden;
        }

        th{
            background:#0284c7;
            color:white;
        }

        th,td{
            padding:15px;
            text-align:center;
            border:1px solid #ddd;
        }

        tr:nth-child(even){
            background:#f1f5f9;
        }

        .btn{
            background:#0284c7;
            color:white;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            margin-bottom:20px;
        }
    </style>

</head>
<body>

    <a href="/">
        <button class="btn">Home</button>
    </a>

    <h1>Resume Analysis History</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>File Name</th>
                <th>Score</th>
                <th>Skills</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="historyBody"></tbody>
    </table>

    <script>

        fetch('/history')
        .then(res => res.json())
        .then(data => {

            const body =
            document.getElementById('historyBody');

            data.forEach(item => {

                body.innerHTML += `
                    <tr>
                        <td>${item.id}</td>
                        <td>${item.filename}</td>
                        <td>${item.score}%</td>
                        <td>${item.skills}</td>
                        <td>${item.uploaded_at}</td>
                    </tr>
                `;

            });

        });

    </script>

</body>
</html>
