<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<style>

body{
    font-family:Segoe UI;
    background:#0f172a;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    color:black;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.card h2{
    color:#0284c7;
    font-size:40px;
}

.btn{
    background:#0284c7;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-bottom:20px;
}

</style>

</head>

<body>

<a href="/">
    <button class="btn">Home</button>
</a>

<h1>ATS Analytics Dashboard</h1>

<div class="cards">

    <div class="card">
        <h3>Total Resumes</h3>
        <h2 id="total">0</h2>
    </div>

    <div class="card">
        <h3>Average Score</h3>
        <h2 id="average">0%</h2>
    </div>

    <div class="card">
        <h3>Highest Score</h3>
        <h2 id="highest">0%</h2>
    </div>

</div>

<script>

fetch('/dashboard')
.then(res => res.json())
.then(data => {

    document.getElementById('total')
        .innerText = data.totalResumes;

    document.getElementById('average')
        .innerText =
        Math.round(data.averageScore || 0) + "%";

    document.getElementById('highest')
        .innerText =
        (data.highestScore || 0) + "%";

});

</script>

</body>
</html>
